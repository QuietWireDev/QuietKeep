services:
  quietkeep:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # environment:
      # Override the auto-detected server IP (e.g. behind a load balancer):
      # - QUIETKEEP_HOST=quietkeep.example.com
      # Inject the JWT signing secret from a secret manager instead of
      # letting QuietKeep persist one to the data volume (optional):
      # - QUIETKEEP_JWT_SECRET=replace-with-a-long-random-value
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - quietkeep-data:/app/data
      - quietkeep-certs:/app/certs
      - quietkeep-ssh:/app/ssh

volumes:
  quietkeep-data:
  quietkeep-certs:
  quietkeep-ssh:
